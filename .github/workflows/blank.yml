name: Trello-newman

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman Tests
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
        run: |
          newman run Trello_workflow.postman_collection.json \
            -r "cli,json,junit,htmlextra" \
            --global-var "Key=$TRELLO_KEY" \
            --global-var "Token=$TRELLO_TOKEN" \
            --global-var "Boardname=abc133"
